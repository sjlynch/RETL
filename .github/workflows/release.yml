name: Release CLI binaries

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: retl-x86_64-unknown-linux-gnu
            archive: retl-x86_64-unknown-linux-gnu.tar.gz
            bin: retl
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: retl-x86_64-apple-darwin
            archive: retl-x86_64-apple-darwin.tar.gz
            bin: retl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: retl-x86_64-pc-windows-msvc
            archive: retl-x86_64-pc-windows-msvc.zip
            bin: retl.exe

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --bin retl --target ${{ matrix.target }}

      - name: Smoke-test built binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          "$bin" --help >/dev/null
          "$bin" quickstart --out-dir "$RUNNER_TEMP/retl_quickstart" | tee "$RUNNER_TEMP/retl_quickstart.txt"
          grep -q "Found 4 unique authors" "$RUNNER_TEMP/retl_quickstart.txt"
          "$bin" sample --data-dir "$RUNNER_TEMP/retl_quickstart/data" --source both --subreddit programming --limit 1 --no-progress | tee "$RUNNER_TEMP/retl_sample.txt"
          grep -q '"subreddit":"programming"' "$RUNNER_TEMP/retl_sample.txt"

      - name: Smoke-test built binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target\${{ matrix.target }}\release\${{ matrix.bin }}"
          & $bin --help | Out-Null
          $output = & $bin quickstart --out-dir "$env:RUNNER_TEMP\retl_quickstart"
          $output | ForEach-Object { Write-Host $_ }
          if (($output -join "`n") -notmatch "Found 4 unique authors") {
            throw "quickstart smoke test did not produce expected output"
          }
          $sample = & $bin sample --data-dir "$env:RUNNER_TEMP\retl_quickstart\data" --source both --subreddit programming --limit 1 --no-progress
          $sample | ForEach-Object { Write-Host $_ }
          if (($sample -join "`n") -notmatch '"subreddit":"programming"') {
            throw "sample smoke test did not produce expected output"
          }

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/pkg
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" dist/pkg/retl
          cp README.md LICENSE dist/pkg/
          chmod 0755 dist/pkg/retl
          tar -C dist/pkg -czf "dist/${{ matrix.archive }}" .

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\pkg | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.bin }}" dist\pkg\retl.exe
          Copy-Item README.md dist\pkg\README.md
          Copy-Item LICENSE dist\pkg\LICENSE
          Compress-Archive -Path dist\pkg\* -DestinationPath "dist\${{ matrix.archive }}" -Force

      - name: Smoke-test packaged artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/extracted
          tar -xzf "dist/${{ matrix.archive }}" -C dist/extracted
          dist/extracted/retl --help >/dev/null
          dist/extracted/retl quickstart --out-dir "$RUNNER_TEMP/retl_quickstart_artifact" | tee "$RUNNER_TEMP/retl_quickstart_artifact.txt"
          grep -q "Found 4 unique authors" "$RUNNER_TEMP/retl_quickstart_artifact.txt"
          dist/extracted/retl sample --data-dir "$RUNNER_TEMP/retl_quickstart_artifact/data" --source both --subreddit programming --limit 1 --no-progress | tee "$RUNNER_TEMP/retl_sample_artifact.txt"
          grep -q '"subreddit":"programming"' "$RUNNER_TEMP/retl_sample_artifact.txt"

      - name: Smoke-test packaged artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\extracted | Out-Null
          Expand-Archive -Path "dist\${{ matrix.archive }}" -DestinationPath dist\extracted -Force
          & dist\extracted\retl.exe --help | Out-Null
          $output = & dist\extracted\retl.exe quickstart --out-dir "$env:RUNNER_TEMP\retl_quickstart_artifact"
          $output | ForEach-Object { Write-Host $_ }
          if (($output -join "`n") -notmatch "Found 4 unique authors") {
            throw "packaged quickstart smoke test did not produce expected output"
          }
          $sample = & dist\extracted\retl.exe sample --data-dir "$env:RUNNER_TEMP\retl_quickstart_artifact\data" --source both --subreddit programming --limit 1 --no-progress
          $sample | ForEach-Object { Write-Host $_ }
          if (($sample -join "`n") -notmatch '"subreddit":"programming"') {
            throw "packaged sample smoke test did not produce expected output"
          }

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
